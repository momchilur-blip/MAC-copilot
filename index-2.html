<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anesthesia Master Dashboard</title>
    <style>
        :root {
            --bg-color: #121212; --text-main: #e0e0e0; --text-muted: #888;
            --card-bg: #1e1e1e; --border-color: #333; --input-bg: #2c2c2c;
            --iso-hypnotic: #ffcc00; --iso-opioid: #00bfff; --iso-relaxant: #ff3333; 
            --iso-pressor: #cc99ff; --iso-local: #cccccc; --alert-green: #28a745;
            --log-prep: #888; --log-pos: #17a2b8; --log-surg: #ffc107; --log-proc: #28a745; --log-hemo: #ff4d4d; --log-drug: #9c27b0;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 10px; padding-bottom: 60px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 15px; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .master-nav { display: flex; justify-content: space-between; gap: 8px; width: 100%; padding: 5px 0 15px 0; border-bottom: 2px solid var(--border-color); position: sticky; top: 0; z-index: 100; }
        .nav-btn { flex: 1; padding: 10px 0; border: 1px solid var(--border-color); border-radius: 8px; font-weight: bold; background: var(--card-bg); color: var(--text-muted); cursor: pointer; }
        .nav-btn.active { background: var(--text-main); color: var(--bg-color); }
        .tab-panel { display: none; } .tab-panel.active { display: block; }
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; }
        .field { display: flex; flex-direction: column; gap: 4px; }
        .field input { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 6px; text-align: center; font-weight: bold; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .log-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-log { padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--input-bg); color: var(--text-main); font-weight: bold; cursor: pointer; text-align: left; }
        .log-textarea { width: 100%; height: 200px; background: #000; color: var(--alert-green); font-family: monospace; padding: 10px; }
        .slider-container { position: relative; height: 50px; margin: 20px 0; }
        .active-slider { position: absolute; width: 100%; z-index: 2; }
    </style>
</head>
<body>

<div class="container">
    <div class="master-nav">
        <button class="nav-btn active" onclick="setMainTab('induction')">Induction</button>
        <button class="nav-btn" onclick="setMainTab('sevo')">Sevo MAC</button>
        <button class="nav-btn" onclick="setMainTab('nmb')">NMB</button>
        <button class="nav-btn" onclick="setMainTab('log')">Log</button>
    </div>

    <div id="main-induction" class="tab-panel active">
        <div class="card">
            <div class="input-grid">
                <div class="field"><label>Age</label><input type="number" id="pt-age"></div>
                <div class="field"><label>Weight</label><input type="number" id="pt-weight"></div>
                <button class="btn" style="background:var(--alert-green);" onclick="calculate()">Calc All</button>
            </div>
            <div id="induction-results"></div>
        </div>
    </div>

    <div id="main-sevo" class="tab-panel">
        <div class="card">
            <h3>Hysteresis-Corrected MAC</h3>
            <input type="range" class="active-slider" id="sevo-slider" min="0" max="3" step="0.1" value="1.0" oninput="updateSevo()">
            <button class="btn" onclick="logSevoChange()">📝 Log Vaporizer</button>
            <div id="target-list"></div>
        </div>
    </div>

    <div id="main-log" class="tab-panel">
        <div class="card">
            <h3>Fentanyl Tally: <span id="fentanyl-total">0</span>mcg</h3>
            <div class="log-grid">
                <button class="btn-log b-opioid" onclick="addFentanyl(50)">+ 50mcg Fent</button>
                <button class="btn-log b-drug" onclick="addLog('Analgin 1g given.')">Analgin 1g</button>
            </div>
            <textarea id="log-output" class="log-textarea"></textarea>
            <button class="btn" onclick="copyLog()">📋 Copy</button>
            <button class="btn" onclick="downloadRecord()">💾 Save .TXT</button>
        </div>
    </div>
</div>

<script>
    let fentanylTotal = 0;
    
    // Core Functions
    function setMainTab(tabId) {
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));
        document.querySelector(`[onclick="setMainTab('${tabId}')"]`).classList.add('active');
        document.getElementById(`main-${tabId}`).classList.add('active');
    }

    function calculate() {
        const weight = document.getElementById('pt-weight').value;
        const age = document.getElementById('pt-age').value;
        const results = document.getElementById('induction-results');
        results.innerHTML = `
            <p>Fentanyl (50mcg/mL): ${(weight*1/50).toFixed(1)}ml</p>
            <p>Propofol (10mg/mL): ${(weight*2/10).toFixed(1)}ml</p>
            <p>Ketamine (50mg/mL): ${(weight*1/50).toFixed(1)}ml</p>
        `;
    }

    function addFentanyl(dose) {
        fentanylTotal += dose;
        document.getElementById('fentanyl-total').innerText = fentanylTotal;
        localStorage.setItem('fentanyl_total', fentanylTotal);
        addLog(`Fentanyl ${dose}mcg (Total: ${fentanylTotal}mcg).`);
    }

    function addLog(text) {
        const ta = document.getElementById('log-output');
        ta.value += `[${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}] ${text}\n`;
        localStorage.setItem('anesthesia_log', ta.value);
    }

    function logSevoChange() {
        addLog(`Vaporizer: ${document.getElementById('sevo-slider').value} vol%`);
    }

    function downloadRecord() {
        const text = document.getElementById('log-output').value;
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([text], {type: 'text/plain'}));
        a.download = "Record.txt";
        a.click();
    }

    window.onload = () => {
        document.getElementById('log-output').value = localStorage.getItem('anesthesia_log') || "";
        fentanylTotal = parseInt(localStorage.getItem('fentanyl_total')) || 0;
        document.getElementById('fentanyl-total').innerText = fentanylTotal;
    };

    function copyLog() {
        document.getElementById('log-output').select();
        document.execCommand('copy');
    }
</script>
</body>
</html>
