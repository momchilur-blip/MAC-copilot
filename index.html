<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAC Anesthesia Simulator v4</title>
    <style>
        :root {
            --agitated: #ff4d4d; 
            --restless: #ff9933; 
            --alert: #28a745;    
            --light-sed: #17a2b8; 
            --deep-sed: #0056b3;  
            --warning-yellow: #ffc107; 
            --bg-color: #f4f7f6;
            --text-main: #333;
            --card-bg: #fff;
            --border-color: #dee2e6;
            --input-bg: #fff;
        }

        /* Dark Mode Variables */
        .dark-mode {
            --bg-color: #121212;
            --text-main: #e0e0e0;
            --card-bg: #1e1e1e;
            --border-color: #333;
            --input-bg: #2c2c2c;
            --deep-sed: #007bff; /* Brighter blue for dark mode */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.3s, color 0.3s;
        }

        h2, h3, h4 { margin-top: 0; }

        .container {
            width: 100%;
            max-width: 600px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.3s;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        /* RASS Scale */
        .rass-container { display: flex; flex-direction: column; gap: 4px; }
        .rass-row {
            display: flex; justify-content: space-between;
            padding: 10px; border-radius: 6px; cursor: pointer;
            border: 2px solid transparent; opacity: 0.6; transition: all 0.2s; font-weight: bold;
        }
        .rass-row:hover { opacity: 0.8; }
        .rass-row.active { opacity: 1; border-color: var(--text-main); transform: scale(1.02); }

        .bg-agitated { background-color: var(--agitated); color: white; }
        .bg-restless { background-color: var(--restless); color: white; }
        .bg-alert { background-color: var(--alert); color: white; }
        .bg-light-sed { background-color: var(--light-sed); color: white; }
        .bg-deep-sed { background-color: var(--deep-sed); color: white; }

        .feedback-box {
            margin-top: 15px; padding: 12px;
            background-color: var(--border-color);
            border-left: 5px solid var(--text-main);
            border-radius: 4px; font-size: 0.95em; line-height: 1.4;
            color: var(--text-main);
        }

        /* Weight & LAST Box */
        .weight-box {
            background: var(--border-color); padding: 10px; border-radius: 8px; margin-bottom: 15px;
        }
        .weight-box input {
            width: 60px; padding: 5px; border: 1px solid #ccc; border-radius: 4px;
            font-size: 1em; font-weight: bold; background: var(--input-bg); color: var(--text-main);
        }

        /* Meds & Buttons */
        .btn {
            display: block; width: 100%; padding: 12px; margin-top: 8px; border: none;
            border-radius: 6px; font-weight: bold; font-size: 1em; cursor: pointer; color: white; transition: 0.2s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-prop { background-color: #6c757d; } 
        .btn-fent { background-color: #007bff; } 
        .btn-midaz { background-color: #9c27b0; } 
        .btn-airway { background-color: #dc3545; } 
        .btn-outline { background-color: transparent; border: 2px solid var(--text-main); color: var(--text-main); padding: 6px 12px; margin: 0;}

        /* Timers */
        .timer-wrapper { margin-top: 5px; margin-bottom: 12px; }
        .progress-bar-bg { background: #e9ecef; height: 8px; border-radius: 4px; overflow: hidden; width: 100%; }
        .progress-bar-fill { height: 100%; transition: width 1s linear, background-color 0.5s ease; }
        #prop-timer-bar { background: var(--alert); width: 0%; }
        #fent-timer-bar { background: var(--warning-yellow); width: 0%; }
        .timer-text { font-size: 0.8em; color: var(--text-main); text-align: center; margin-top: 2px; font-weight: bold; opacity: 0.8; }

        /* Tracker */
        .tracker {
            display: grid; grid-template-columns: repeat(4, 1fr); text-align: center;
            font-size: 0.85em; margin-top: 5px; padding-top: 10px; border-top: 1px solid var(--border-color);
        }
        .tracker-value { font-size: 1.4em; font-weight: bold; color: var(--text-main); margin-top: 4px; }
        .tracker-total { font-size: 0.8em; font-weight: bold; background: var(--border-color); border-radius: 4px; padding: 2px 4px; margin-top: 4px; display: inline-block;}

        @media (min-width: 600px) {
            .container { grid-template-columns: 1fr 1fr; }
            .header-card { grid-column: span 2; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card header-card">
            <div class="top-bar">
                <h2 style="margin:0;">MAC Co-Pilot v4</h2>
                <div>
                    <button class="btn-outline" onclick="toggleDarkMode()">🌙 Dark</button>
                    <button class="btn-outline" onclick="resetCase()">🔄 New Case</button>
                </div>
            </div>
        </div>

        <!-- Left Column: RASS Scale -->
        <div class="card">
            <h3>RASS Scale</h3>
            <div class="rass-container" id="rass-container"></div>
            <div class="feedback-box" id="guideline-feedback">Select a RASS level to see clinical guidelines.</div>
        </div>

        <!-- Right Column: Meds & Tracker -->
        <div class="card">
            <div class="weight-box">
                <label for="pt-weight" style="font-weight: bold; font-size: 0.9em;">Patient Wt (kg): </label>
                <input type="number" id="pt-weight" placeholder="70" oninput="updateLAST()">
                <div style="font-size: 0.85em; margin-top: 8px; line-height: 1.4;">
                    <strong>LAST Limits (w/o Epi):</strong> Lido <span style="color:#d9534f; font-weight:bold;" id="last-lido">315 mg</span> | Bupi <span style="color:#d9534f; font-weight:bold;" id="last-bupi">175 mg</span>
                </div>
            </div>

            <!-- Midazolam -->
            <button class="btn btn-midaz" onclick="logAction('midaz')">+ 1 mg Midazolam</button>
            <div class="timer-wrapper" style="margin-bottom: 15px;"><div class="timer-text">Onset: 2-3m | Duration: 30-60m</div></div>

            <!-- Fentanyl Button & Timer -->
            <button class="btn btn-fent" onclick="logAction('fentanyl')">+ 25 mcg Fentanyl</button>
            <div class="timer-wrapper">
                <div class="progress-bar-bg"><div class="progress-bar-fill" id="fent-timer-bar"></div></div>
                <div class="timer-text" id="fent-timer-text">No active bolus</div>
            </div>

            <!-- Propofol Button & Timer -->
            <button class="btn btn-prop" onclick="logAction('propofol')">+ 10 mg Propofol</button>
            <div class="timer-wrapper">
                <div class="progress-bar-bg"><div class="progress-bar-fill" id="prop-timer-bar"></div></div>
                <div class="timer-text" id="prop-timer-text">No active bolus</div>
            </div>

            <button class="btn btn-airway" onclick="logAction('airway')">⚠️ Jaw Thrust / Airway Mnv.</button>

            <!-- Tracker -->
            <div class="tracker">
                <div>
                    <div>Midaz</div>
                    <div class="tracker-value" id="count-midaz">0</div>
                    <div class="tracker-total" id="total-midaz">0 mg</div>
                </div>
                <div>
                    <div>Fent</div>
                    <div class="tracker-value" id="count-fent">0</div>
                    <div class="tracker-total" id="total-fent">0 mcg</div>
                </div>
                <div>
                    <div>Prop</div>
                    <div class="tracker-value" id="count-prop">0</div>
                    <div class="tracker-total" id="total-prop">0 mg</div>
                </div>
                <div>
                    <div>Airway</div>
                    <div class="tracker-value" id="count-airway">0</div>
                    <div class="tracker-total">Events</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const rassData = [
            { score: "+4", label: "Combative", class: "bg-agitated", text: "DANGER: Immediate threat. Requires rapid, deep sedation." },
            { score: "+3", label: "Very Agitated", class: "bg-agitated", text: "Pulling at lines. Assess for severe pain or hypoxemia immediately." },
            { score: "+2", label: "Agitated", class: "bg-agitated", text: "Frequent non-purposeful movement. Check for pain vs anxiety." },
            { score: "+1", label: "Restless", class: "bg-restless", text: "Anxious or fidgety. Pre-empt stimulus with small Propofol bolus." },
            { score: "0", label: "Alert & Calm", class: "bg-alert", text: "TARGET ZONE. Maintain current strategy." },
            { score: "-1", label: "Drowsy", class: "bg-light-sed", text: "Sustains eye contact >10s. Excellent for most MAC cases." },
            { score: "-2", label: "Light Sedation", class: "bg-light-sed", text: "Eye contact <10s. Acceptable if surgical stimulus is high." },
            { score: "-3", label: "Mod. Sedation", class: "bg-deep-sed", text: "Moves to voice, NO eye contact. HOLD SEDATION." },
            { score: "-4", label: "Deep Sedation", class: "bg-deep-sed", text: "Moves ONLY to physical stimulus. VENTILATORY PAUSE." },
            { score: "-5", label: "Unarousable", class: "bg-deep-sed", text: "Unresponsive. You are providing GA without a secured airway. Rescue airway immediately." }
        ];

        let counts = { propofol: 0, fentanyl: 0, midaz: 0, airway: 0 };
        const doses = { propofol: 10, fentanyl: 25, midaz: 1 }; 
        
        let propTimerInterval = null, propTimeLeft = 0, propEndTime = 0;
let fentTimerInterval = null, fentTimeLeft = 0, fentEndTime = 0;
const PROP_DURATION = 240; 
const FENT_PEAK_DURATION = 240; 
 

        function initApp() {
            const container = document.getElementById('rass-container');
            container.innerHTML = '';
            rassData.forEach(item => {
                const row = document.createElement('div');
                row.className = `rass-row ${item.class}`;
                row.innerHTML = `<span>${item.score}</span> <span>${item.label}</span>`;
                row.onclick = () => selectRASS(row, item);
                container.appendChild(row);
                if(item.score === "0") selectRASS(row, item);
            });
        }

        function selectRASS(element, data) {
            document.querySelectorAll('.rass-row').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            
            const feedbackBox = document.getElementById('guideline-feedback');
            feedbackBox.style.borderColor = getComputedStyle(element).backgroundColor;
            feedbackBox.innerHTML = `<strong>RASS ${data.score}:</strong><br>${data.text}`;
        }

        function updateLAST() {
            const wt = document.getElementById('pt-weight').value;
            if(wt > 0) {
                document.getElementById('last-lido').innerText = `${(wt * 4.5).toFixed(0)} mg`;
                document.getElementById('last-bupi').innerText = `${(wt * 2.5).toFixed(0)} mg`;
            } else {
                document.getElementById('last-lido').innerText = `315 mg`;
                document.getElementById('last-bupi').innerText = `175 mg`;
            }
        }

        function logAction(type) {
            counts[type]++;
            
            if(type === 'propofol') {
                document.getElementById('count-prop').innerText = counts[type];
                document.getElementById('total-prop').innerText = (counts[type] * doses.propofol) + " mg";
                startPropTimer();
            }
            if(type === 'fentanyl') {
                document.getElementById('count-fent').innerText = counts[type];
                document.getElementById('total-fent').innerText = (counts[type] * doses.fentanyl) + " mcg";
                startFentTimer();
            }
            if(type === 'midaz') {
                document.getElementById('count-midaz').innerText = counts[type];
                document.getElementById('total-midaz').innerText = (counts[type] * doses.midaz) + " mg";
            }
            if(type === 'airway') {
                document.getElementById('count-airway').innerText = counts[type];
                const deepSedRow = document.querySelectorAll('.rass-row')[8]; // RASS -4
                selectRASS(deepSedRow, rassData[8]); 
            }
            
            const btn = document.querySelector(`.btn-${type.substring(0,4)}`);
            if(btn) {
                const originalText = btn.innerText;
                btn.innerText = "Logged!";
                setTimeout(() => btn.innerText = originalText, 500);
            }
        }

        function startPropTimer() {
    propEndTime = Date.now() + (PROP_DURATION * 1000);
    clearInterval(propTimerInterval);
    
    propTimerInterval = setInterval(() => {
        // Calculate the difference between the target time and right now
        propTimeLeft = Math.ceil((propEndTime - Date.now()) / 1000);
        
        if(propTimeLeft <= 0) {
            propTimeLeft = 0;
            clearInterval(propTimerInterval);
        }
        updatePropTimerUI();
    }, 1000);
    
    updatePropTimerUI();
}

        function updatePropTimerUI() {
            const bar = document.getElementById('prop-timer-bar');
            const text = document.getElementById('prop-timer-text');
            if(propTimeLeft <= 0) { bar.style.width = '0%'; text.innerText = "Bolus redistributed"; return; }
            bar.style.width = ((propTimeLeft / PROP_DURATION) * 100) + '%';
            let mins = Math.floor(propTimeLeft / 60);
            let secs = propTimeLeft % 60;
            text.innerText = `Active effect: ${mins}:${secs < 10 ? '0' : ''}${secs}`;
            if(propTimeLeft > 120) bar.style.backgroundColor = '#28a745'; 
            else if (propTimeLeft > 45) bar.style.backgroundColor = '#ff9933'; 
            else bar.style.backgroundColor = '#dc3545'; 
        }

        function startFentTimer() {
    fentEndTime = Date.now() + (FENT_PEAK_DURATION * 1000);
    clearInterval(fentTimerInterval);
    
    fentTimerInterval = setInterval(() => {
        // Calculate the difference between the target time and right now
        fentTimeLeft = Math.ceil((fentEndTime - Date.now()) / 1000);
        
        if(fentTimeLeft <= 0) {
            fentTimeLeft = 0;
            clearInterval(fentTimerInterval);
        }
        updateFentTimerUI();
    }, 1000);
    
    updateFentTimerUI();
}

        function updateFentTimerUI() {
            const bar = document.getElementById('fent-timer-bar');
            const text = document.getElementById('fent-timer-text');
            if(fentTimeLeft <= 0) {
                bar.style.width = '100%'; bar.style.backgroundColor = '#28a745'; text.innerText = "Peak effect reached"; return;
            }
            bar.style.width = (((FENT_PEAK_DURATION - fentTimeLeft) / FENT_PEAK_DURATION) * 100) + '%';
            bar.style.backgroundColor = 'var(--warning-yellow)';
            let mins = Math.floor(fentTimeLeft / 60);
            let secs = fentTimeLeft % 60;
            text.innerHTML = `<span style="color:#d9534f;">DO NOT REDOSE</span> | Peak in: ${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }

        function resetCase() {
            if(confirm("End case and reset all trackers to zero?")) {
                counts = { propofol: 0, fentanyl: 0, midaz: 0, airway: 0 };
                document.querySelectorAll('.tracker-value').forEach(el => el.innerText = "0");
                document.querySelectorAll('.tracker-total').forEach(el => {
                    if(el.id) el.innerText = el.id.includes("prop") || el.id.includes("midaz") ? "0 mg" : "0 mcg";
                });
                
                clearInterval(propTimerInterval); propTimeLeft = 0; updatePropTimerUI();
                clearInterval(fentTimerInterval); fentTimeLeft = 0; updateFentTimerUI();
                
                document.getElementById('pt-weight').value = '';
                updateLAST();
                selectRASS(document.querySelectorAll('.rass-row')[4], rassData[4]); // Reset to RASS 0
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
